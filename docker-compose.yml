version: "3.8"

services:

  # ---------------------------
  # MongoDB
  # ---------------------------
  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # ---------------------------
  # Zookeeper
  # ---------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  # ---------------------------
  # Kafka
  # ---------------------------
  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ---------------------------
  # Auth Service
  # ---------------------------
  auth-service:
    build: ./services/auth-service
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - kafka
    env_file:
      - .env

  # ---------------------------
  # Movie Service
  # ---------------------------
  movie-service:
    build: ./services/movie-service
    ports:
      - "6000:6000"
    depends_on:
      - mongo
    env_file:
      - .env

  # ---------------------------
  # Recommendation Service
  # ---------------------------
  recommendation-service:
    build: ./services/recommendation-service
    ports:
      - "7000:7000"
    depends_on:
      - mongo
    env_file:
      - .env

  # ---------------------------
  # Notification Service
  # ---------------------------
  notification-service:
    build: ./services/notification-service
    depends_on:
      - kafka
    env_file:
      - .env

  # ---------------------------
  # Frontend
  # ---------------------------
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - movie-service

volumes:
  mongo_data:
